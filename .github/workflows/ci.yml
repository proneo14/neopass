name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Go Backend ──────────────────────────────────────────────
  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  go-security:
    name: Go Security (gosec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -exclude=G104 ./...

  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out
          retention-days: 7

  go-build:
    name: Go Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux
          - goos: darwin
            goarch: amd64
            suffix: darwin
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows
            ext: .exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build server
        run: go build -trimpath -ldflags="-s -w" -o bin/server-${{ matrix.suffix }}${{ matrix.ext }} ./cmd/server/
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
      - name: Build native host
        run: go build -trimpath -ldflags="-s -w" -o bin/qpm-native-host-${{ matrix.suffix }}${{ matrix.ext }} ./cmd/nativehost/
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
      - name: Upload Go binaries
        uses: actions/upload-artifact@v4
        with:
          name: go-binaries-${{ matrix.suffix }}
          path: bin/
          retention-days: 14

  # ── Docker ──────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [go-test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t lgi-pass-server:ci .
      - name: Verify health endpoint
        run: |
          docker run -d --name test-server -p 8443:8443 -e PORT=8443 lgi-pass-server:ci
          sleep 3
          curl -sf http://localhost:8443/health | grep -q ok
          docker stop test-server

  # ── Electron Desktop App ────────────────────────────────────
  electron-lint:
    name: Electron Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: electron
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: electron/package-lock.json
      - run: npm ci
      - run: npm run lint

  electron-test:
    name: Electron Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: electron
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: electron/package-lock.json
      - run: npm ci
      - run: npm test

  electron-build:
    name: Electron Build
    runs-on: ubuntu-latest
    needs: [electron-test]
    defaults:
      run:
        working-directory: electron
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: electron/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Upload Electron build
        uses: actions/upload-artifact@v4
        with:
          name: electron-build
          path: electron/dist/
          retention-days: 7

  # ── Browser Extension ───────────────────────────────────────
  extension-lint:
    name: Extension Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
      - run: npm run lint

  extension-test:
    name: Extension Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
      - run: npm test

  extension-build:
    name: Extension Build (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: [extension-test]
    strategy:
      matrix:
        browser: [chrome, firefox, edge]
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
      - name: Build ${{ matrix.browser }}
        run: npx cross-env TARGET_BROWSER=${{ matrix.browser }} npx webpack --mode production
      - name: Package extension
        run: cd dist/${{ matrix.browser }} && zip -r ../../lgi-pass-${{ matrix.browser }}.zip .
      - name: Upload extension
        uses: actions/upload-artifact@v4
        with:
          name: extension-${{ matrix.browser }}
          path: extension/lgi-pass-${{ matrix.browser }}.zip
          retention-days: 14

name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: write
  actions: write

jobs:
  # ── Cleanup old artifacts/caches to free storage quota ─────
  cleanup:
    name: Free Storage
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete old Actions caches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Cleaning Actions caches for ${{ github.repository }}…"
          gh api repos/${{ github.repository }}/actions/caches --paginate -q '.actions_caches[].id' \
            | head -50 \
            | xargs -I{} gh api -X DELETE repos/${{ github.repository }}/actions/caches/{} 2>/dev/null || true
          echo "Done"

  # ── Auto-version ───────────────────────────────────────────
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    needs: [cleanup]
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      skipped: ${{ steps.version.outputs.skipped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute next version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Manual tag push — use that tag
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          else
            # Push to main — auto-increment patch
            LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
            if [ -z "$LATEST" ]; then
              NEXT="v1.0.0"
            else
              # Parse semver and increment patch
              VERSION="${LATEST#v}"
              MAJOR=$(echo "$VERSION" | cut -d. -f1)
              MINOR=$(echo "$VERSION" | cut -d. -f2)
              PATCH=$(echo "$VERSION" | cut -d. -f3)
              NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi

            # Skip if HEAD is already tagged (e.g. release.yml triggered by its own tag)
            HEAD_TAGS=$(git tag --points-at HEAD)
            if echo "$HEAD_TAGS" | grep -q "^v"; then
              echo "skipped=true" >> "$GITHUB_OUTPUT"
              echo "tag=" >> "$GITHUB_OUTPUT"
              echo "version=" >> "$GITHUB_OUTPUT"
              echo "HEAD already tagged — skipping release"
              exit 0
            fi

            echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
            echo "version=${NEXT#v}" >> "$GITHUB_OUTPUT"
            echo "skipped=false" >> "$GITHUB_OUTPUT"
            echo "Next version: $NEXT"

            # Create and push the tag
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$NEXT" -m "Auto-release $NEXT"
            git push origin "$NEXT"
          fi

  # ── Build Go binaries for all platforms ─────────────────────
  go-binaries:
    name: Go Build (${{ matrix.suffix }})
    runs-on: ubuntu-latest
    needs: [version]
    if: needs.version.outputs.skipped == 'false'
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux
          - goos: darwin
            goarch: amd64
            suffix: darwin
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows
            ext: .exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build server
        run: go build -trimpath -ldflags="-s -w" -o bin/server${{ matrix.ext }} ./cmd/server/
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
      - name: Build native host
        run: go build -trimpath -ldflags="-s -w" -o bin/qpm-native-host${{ matrix.ext }} ./cmd/nativehost/
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
      - uses: actions/upload-artifact@v4
        with:
          name: go-binaries-${{ matrix.suffix }}
          path: bin/
          retention-days: 7

  # ── Browser extensions ──────────────────────────────────────
  extensions:
    name: Extension (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: [version]
    if: needs.version.outputs.skipped == 'false'
    strategy:
      matrix:
        browser: [chrome, firefox, edge]
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
      - run: npx cross-env TARGET_BROWSER=${{ matrix.browser }} npx webpack --mode production
      - run: cd dist/${{ matrix.browser }} && zip -r ../../lgi-pass-${{ matrix.browser }}.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: extension-${{ matrix.browser }}
          path: extension/lgi-pass-${{ matrix.browser }}.zip
          retention-days: 7

  # ── Electron — Windows ─────────────────────────────────────
  electron-windows:
    name: Electron (Windows)
    runs-on: windows-latest
    needs: [version, go-binaries]
    if: needs.version.outputs.skipped == 'false'
    defaults:
      run:
        working-directory: electron
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: electron/package-lock.json
      - run: npm ci
      - name: Stamp version into package.json
        run: npm pkg set version=${{ needs.version.outputs.version }}
      - name: Enable Developer Mode (symlink support)
        run: reg add "HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" /t REG_DWORD /f /v AllowDevelopmentWithoutDevLicense /d 1
      - uses: actions/download-artifact@v4
        with:
          name: go-binaries-windows
          path: bin
      - run: npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: electron-windows
          path: electron/release/*.exe
          retention-days: 7

  # ── Electron — macOS ────────────────────────────────────────
  electron-macos:
    name: Electron (macOS)
    runs-on: macos-latest
    needs: [version, go-binaries]
    if: needs.version.outputs.skipped == 'false'
    defaults:
      run:
        working-directory: electron
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: electron/package-lock.json
      - run: npm ci
      - name: Stamp version into package.json
        run: npm pkg set version=${{ needs.version.outputs.version }}
      - uses: actions/download-artifact@v4
        with:
          name: go-binaries-darwin
          path: bin
      - run: chmod +x ../bin/*
      - run: npm run dist:mac
      - uses: actions/upload-artifact@v4
        with:
          name: electron-macos
          path: electron/release/*.dmg
          retention-days: 7

  # ── Electron — Linux ────────────────────────────────────────
  electron-linux:
    name: Electron (Linux)
    runs-on: ubuntu-latest
    needs: [version, go-binaries]
    if: needs.version.outputs.skipped == 'false'
    defaults:
      run:
        working-directory: electron
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: electron/package-lock.json
      - run: npm ci
      - name: Stamp version into package.json
        run: npm pkg set version=${{ needs.version.outputs.version }}
      - uses: actions/download-artifact@v4
        with:
          name: go-binaries-linux
          path: bin
      - run: chmod +x ../bin/*
      - run: npm run dist:linux
      - uses: actions/upload-artifact@v4
        with:
          name: electron-linux
          path: |
            electron/release/*.AppImage
            electron/release/*.deb
          retention-days: 7

  # ── Docker image ────────────────────────────────────────────
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: [version]
    if: needs.version.outputs.skipped == 'false'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Delete old GHCR versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: password-manager
          package-type: container
          min-versions-to-keep: 2
          delete-only-untagged-versions: false
        continue-on-error: true
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest

  # ── GitHub Release ──────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version, electron-windows, electron-macos, electron-linux, extensions, docker]
    if: needs.version.outputs.skipped == 'false'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/electron-windows/*.exe
            artifacts/electron-macos/*.dmg
            artifacts/electron-linux/*.AppImage
            artifacts/electron-linux/*.deb
            artifacts/extension-chrome/*.zip
            artifacts/extension-firefox/*.zip
            artifacts/extension-edge/*.zip

      - name: Delete intermediate artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            go-binaries-*
            electron-windows
            electron-macos
            electron-linux
            extension-chrome
            extension-firefox
            extension-edge

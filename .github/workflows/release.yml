name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Build Go binaries for all platforms ─────────────────────
  go-binaries:
    name: Go Build (${{ matrix.suffix }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux
          - goos: darwin
            goarch: amd64
            suffix: darwin
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows
            ext: .exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build server
        run: go build -trimpath -ldflags="-s -w" -o bin/server${{ matrix.ext }} ./cmd/server/main.go
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
      - name: Build native host
        run: go build -trimpath -ldflags="-s -w" -o bin/qpm-native-host${{ matrix.ext }} ./cmd/nativehost/main.go
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
      - uses: actions/upload-artifact@v4
        with:
          name: go-binaries-${{ matrix.suffix }}
          path: bin/

  # ── Browser extensions ──────────────────────────────────────
  extensions:
    name: Extension (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome, firefox, edge]
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
      - run: npx cross-env TARGET_BROWSER=${{ matrix.browser }} npx webpack --mode production
      - run: cd dist/${{ matrix.browser }} && zip -r ../../lgi-pass-${{ matrix.browser }}.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: extension-${{ matrix.browser }}
          path: extension/lgi-pass-${{ matrix.browser }}.zip

  # ── Electron — Windows ─────────────────────────────────────
  electron-windows:
    name: Electron (Windows)
    runs-on: windows-latest
    needs: [go-binaries]
    defaults:
      run:
        working-directory: electron
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: electron/package-lock.json
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: go-binaries-windows
          path: bin
      - run: npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: electron-windows
          path: electron/release/*.exe

  # ── Electron — macOS ────────────────────────────────────────
  electron-macos:
    name: Electron (macOS)
    runs-on: macos-latest
    needs: [go-binaries]
    defaults:
      run:
        working-directory: electron
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: electron/package-lock.json
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: go-binaries-darwin
          path: bin
      - run: chmod +x ../bin/*
      - run: npm run dist:mac
      - uses: actions/upload-artifact@v4
        with:
          name: electron-macos
          path: electron/release/*.dmg

  # ── Electron — Linux ────────────────────────────────────────
  electron-linux:
    name: Electron (Linux)
    runs-on: ubuntu-latest
    needs: [go-binaries]
    defaults:
      run:
        working-directory: electron
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: electron/package-lock.json
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: go-binaries-linux
          path: bin
      - run: chmod +x ../bin/*
      - run: npm run dist:linux
      - uses: actions/upload-artifact@v4
        with:
          name: electron-linux
          path: |
            electron/release/*.AppImage
            electron/release/*.deb

  # ── Docker image ────────────────────────────────────────────
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── GitHub Release ──────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [electron-windows, electron-macos, electron-linux, extensions, docker]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/electron-windows/*.exe
            artifacts/electron-macos/*.dmg
            artifacts/electron-linux/*.AppImage
            artifacts/electron-linux/*.deb
            artifacts/extension-chrome/*.zip
            artifacts/extension-firefox/*.zip
            artifacts/extension-edge/*.zip

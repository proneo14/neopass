name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: write
  actions: write
  packages: write

jobs:
  # ── Auto-version ───────────────────────────────────────────
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      skipped: ${{ steps.version.outputs.skipped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute next version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          else
            LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
            if [ -z "$LATEST" ]; then
              NEXT="v1.0.0"
            else
              VERSION="${LATEST#v}"
              MAJOR=$(echo "$VERSION" | cut -d. -f1)
              MINOR=$(echo "$VERSION" | cut -d. -f2)
              PATCH=$(echo "$VERSION" | cut -d. -f3)
              NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi

            HEAD_TAGS=$(git tag --points-at HEAD)
            if echo "$HEAD_TAGS" | grep -q "^v"; then
              echo "skipped=true" >> "$GITHUB_OUTPUT"
              echo "tag=" >> "$GITHUB_OUTPUT"
              echo "version=" >> "$GITHUB_OUTPUT"
              echo "HEAD already tagged — skipping release"
              exit 0
            fi

            echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
            echo "version=${NEXT#v}" >> "$GITHUB_OUTPUT"
            echo "skipped=false" >> "$GITHUB_OUTPUT"
            echo "Next version: $NEXT"

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$NEXT" -m "Auto-release $NEXT"
            git push origin "$NEXT"
          fi

  # ── Electron — Windows (builds Go inline, uploads directly to release) ──
  electron-windows:
    name: Electron (Windows)
    runs-on: windows-latest
    needs: [version]
    if: needs.version.outputs.skipped == 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: electron/package-lock.json
      - name: Build Go binaries
        run: |
          go build -trimpath -ldflags="-s -w" -o bin/server.exe ./cmd/server/
          go build -trimpath -ldflags="-s -w" -o bin/neopass-native-host.exe ./cmd/nativehost/
        env:
          CGO_ENABLED: "0"
      - name: Install Electron deps
        working-directory: electron
        run: npm ci
      - name: Stamp version
        working-directory: electron
        run: npm pkg set version=${{ needs.version.outputs.version }}
      - name: Enable Developer Mode
        run: reg add "HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" /t REG_DWORD /f /v AllowDevelopmentWithoutDevLicense /d 1
      - name: Build Electron
        working-directory: electron
        run: npm run dist:win
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          files: electron/release/*.exe

  # ── Electron — macOS ────────────────────────────────────────
  electron-macos:
    name: Electron (macOS)
    runs-on: macos-latest
    needs: [version]
    if: needs.version.outputs.skipped == 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: electron/package-lock.json
      - name: Build Go binaries
        run: |
          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o bin/server ./cmd/server/
          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o bin/neopass-native-host ./cmd/nativehost/
        env:
          CGO_ENABLED: "0"
      - name: Install Electron deps
        working-directory: electron
        run: npm ci
      - name: Stamp version
        working-directory: electron
        run: npm pkg set version=${{ needs.version.outputs.version }}
      - name: Build Electron
        working-directory: electron
        run: npm run dist:mac
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          files: electron/release/*.dmg

  # ── Electron — Linux ────────────────────────────────────────
  electron-linux:
    name: Electron (Linux)
    runs-on: ubuntu-latest
    needs: [version]
    if: needs.version.outputs.skipped == 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: electron/package-lock.json
      - name: Build Go binaries
        run: |
          go build -trimpath -ldflags="-s -w" -o bin/server ./cmd/server/
          go build -trimpath -ldflags="-s -w" -o bin/neopass-native-host ./cmd/nativehost/
        env:
          CGO_ENABLED: "0"
      - name: Install Electron deps
        working-directory: electron
        run: npm ci
      - name: Stamp version
        working-directory: electron
        run: npm pkg set version=${{ needs.version.outputs.version }}
      - name: Build Electron
        working-directory: electron
        run: npm run dist:linux
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          files: |
            electron/release/*.AppImage
            electron/release/*.deb

  # ── Browser extensions (single job, no artifacts) ───────────
  extensions:
    name: Extensions
    runs-on: ubuntu-latest
    needs: [version]
    if: needs.version.outputs.skipped == 'false'
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
      - name: Build all browsers
        run: |
          for browser in chrome firefox edge; do
            npx cross-env TARGET_BROWSER=$browser npx webpack --mode production
            cd dist/$browser && zip -r ../../neopass-$browser.zip . && cd ../..
          done
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          files: |
            extension/neopass-chrome.zip
            extension/neopass-firefox.zip
            extension/neopass-edge.zip

  # ── Docker image ────────────────────────────────────────────
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: [version]
    if: needs.version.outputs.skipped == 'false'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Delete old GHCR versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: password-manager
          package-type: container
          min-versions-to-keep: 2
          delete-only-untagged-versions: false
        continue-on-error: true
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest

  # ── Finalize release notes ─────────────────────────────────
  finalize:
    name: Finalize Release
    runs-on: ubuntu-latest
    needs: [version, electron-windows, electron-macos, electron-linux, extensions, docker]
    if: always() && needs.version.outputs.skipped == 'false'
    steps:
      - uses: actions/checkout@v4
      - name: Update release notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          generate_release_notes: true

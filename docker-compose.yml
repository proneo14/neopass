services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: password_manager
      POSTGRES_USER: pmuser
      POSTGRES_PASSWORD: pmpass_dev_only
    networks:
      - internal
    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pmuser -d password_manager"]
      interval: 3s
      timeout: 3s
      retries: 10

  server:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://pmuser:pmpass_dev_only@postgres:5432/password_manager?sslmode=disable
      PORT: "8443"
      MIGRATIONS_DIR: migrations
      LOG_LEVEL: debug
      TLS_CERT: ""
      TLS_KEY: ""
      CORS_ORIGINS: ""
    ports:
      - "8444:8443"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8443/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
    external: true
    name: password-manager-pgdata
